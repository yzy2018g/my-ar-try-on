<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR 虛擬試衣間</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #222; color: white; margin: 0; padding: 20px; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .preview-box { display: flex; gap: 10px; margin-bottom: 10px; }
        .preview-box img { width: 80px; height: 80px; object-fit: cover; border: 2px solid #fff; cursor: pointer; border-radius: 8px; }
        .preview-box img.active { border-color: #00ffcc; }
        .view-panel { position: relative; width: 100%; max-width: 500px; aspect-ratio: 3/4; background: #000; border-radius: 12px; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        canvas { z-index: 10; pointer-events: none; } /* 讓 Canvas 疊在 Video 上 */
        .loading { display: none; color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

    <h1>AR 虛擬試衣間</h1>
    
    <div class="container">
        <div class="preview-box">
            <img src="cloth.png" alt="預覽1" onclick="selectCloth('cloth.png', this)">
            <img src="style_1.png" alt="預覽2" onclick="selectCloth('style_1.png', this)">
            <img src="style_2.png" alt="預覽3" onclick="selectCloth('style_2.png', this)">
        </div>

        <div id="loadingStatus" class="loading">後端 AI 去背處理中...請稍候...</div>

        <div class="view-panel">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="arCanvas"></canvas>
        </div>
    </div>
    <script type="module">
    // 引入 Gradio API Client
    import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client@1/dist/index.min.js";
    
    // 引入 MediaPipe Pose 偵測工具
    import { Pose } from "https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js";
    import { Camera } from "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js";

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('arCanvas');
    const ctx = canvas.getContext('2d');
    const loadingStatus = document.getElementById('loadingStatus');
    
    let currentClothingImage = new Image(); 
    let isClothLoaded = false;
    let currentLandmarks = null; // 用來儲存最新的身體骨架座標

    // ==========================================
    // 1. 初始化 MediaPipe Pose 身體追蹤
    // ==========================================
    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
        modelComplexity: 1,      // 1 代表平衡速度與準確度
        smoothLandmarks: true,   // 平滑化骨架，防止衣服抖動
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    // 每次偵測到身體骨架時，更新座標
    pose.onResults((results) => {
        if (results.poseLandmarks) {
            currentLandmarks = results.poseLandmarks;
        } else {
            currentLandmarks = null; // 沒偵測到人
        }
        // 觸發畫布渲染
        renderLoop();
    });

    // ==========================================
    // 2. 初始化相機並啟動偵測
    // ==========================================
    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
            video.srcObject = stream;
            
            video.addEventListener('loadedmetadata', () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                // 讓 MediaPipe 透過 Camera 工具接管鏡頭，每秒持續送影格給 AI 追蹤
                const camera = new Camera(video, {
                    onFrame: async () => {
                        await pose.send({ image: video });
                    },
                    width: video.videoWidth,
                    height: video.videoHeight
                });
                camera.start();
            });
        } catch (err) {
            alert("無法開啟相機，請檢查權限設定。");
            console.error(err);
        }
    }

    // ==========================================
    // 3. 選擇衣服並送去 Hugging Face 去背
    // ==========================================
    window.selectCloth = async function(imgSrc, element) {
        document.querySelectorAll('.preview-box img').forEach(img => img.classList.remove('active'));
        element.classList.add('active');

        loadingStatus.style.display = "block";
        loadingStatus.textContent = "後端 AI 去背處理中...請稍候...";
        isClothLoaded = false;

        try {
            const response = await fetch(imgSrc);
            const blob = await response.blob();

            // 直接連線你的後端 API
            const app = await Client.connect("https://michaelyo-my-ar-cloth-api.hf.space");
            const result = await app.predict("/predict", { input_image: blob });

            if (result.data && result.data[0]) {
                const dataObj = result.data[0];
                if (dataObj && typeof dataObj === 'object' && dataObj.url) {
                    currentClothingImage.src = dataObj.url;
                } else if (typeof dataObj === 'string') {
                    currentClothingImage.src = dataObj;
                }

                currentClothingImage.onload = () => {
                    isClothLoaded = true;
                    loadingStatus.style.display = "none";
                };
            }
        } catch (error) {
            console.error("詳細錯誤訊息:", error);
            loadingStatus.textContent = "AI 處理失敗：" + error.message;
        }
    }

    // ==========================================
    // 4. AR 即時渲染（動態計算衣服位置）
    // ==========================================
    function renderLoop() {
        // 清除上一格畫布
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 只有當「去背衣服好了」且「畫面中有偵測到人」才畫衣服
        if (isClothLoaded && currentLandmarks) {
            
            // MediaPipe 關鍵點定義：11 是左肩，12 是右肩
            // (注意：因為是前鏡頭鏡像關係，畫面上的左右會顛倒)
            const leftShoulder = currentLandmarks[11];
            const rightShoulder = currentLandmarks[12];

            // 1. 將 MediaPipe 的 0~1 相對座標，轉換成 Canvas 的實際像素座標
            const xL = leftShoulder.x * canvas.width;
            const yL = leftShoulder.y * canvas.height;
            const xR = rightShoulder.x * canvas.width;
            const yR = rightShoulder.y * canvas.height;

            // 2. 計算兩肩中點（作為衣服領口的中心掛點）
            const midX = (xL + xR) / 2;
            const midY = (yL + yR) / 2;

            // 3. 計算兩肩寬度，並依比例放大（例如乘以 1.8 讓衣服蓋住肩膀與袖子）
            const shoulderWidth = Math.sqrt(Math.pow(xL - xR, 2) + Math.pow(yL - yR, 2));
            const clothWidth = shoulderWidth * 1.8; 

            // 4. 根據衣服原始比例，計算出對應的高度
            const clothHeight = clothWidth * (currentClothingImage.height / currentClothingImage.width);

            // 5. 計算衣服左上角的渲染起點 (X, Y)
            // 我們把中點往左移半個衣寬，往下移一點點（微調領口位置，1.15可視情況調整）
            const clothX = midX - (clothWidth / 2);
            const clothY = midY - (clothHeight * 0.15); 

            // 6. 計算身體傾斜角度，讓衣服跟著肩膀旋轉
            const angle = Math.atan2(yL - yR, xL - xR);

            // 7. 繪製旋轉後的衣服
            ctx.save();
            ctx.translate(midX, midY); // 將畫布中心移到肩膀中點
            ctx.rotate(angle);         // 旋轉畫布
            
            // 繪製衣服（此時座標以中點為基準微調）
            ctx.drawImage(
                currentClothingImage, 
                -(clothWidth / 2), 
                -(clothHeight * 0.15), 
                clothWidth, 
                clothHeight
            );
            
            ctx.restore(); // 恢復畫布狀態
        }
    }

    // 啟動相機
    setupCamera();
</script>


    
        
</body>
</html>

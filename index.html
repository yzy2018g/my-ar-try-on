<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR API 測試 v2</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:#e2e8f0;
  padding:20px;
}

input, button {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #334155;
  background:#111827;
  color:white;
}

button {
  background:#6366f1;
  cursor:pointer;
}

pre {
  background:#111827;
  padding:10px;
  border-radius:8px;
  overflow:auto;
}

.status {
  margin-top:10px;
  font-weight:bold;
}
.ok { color:#22c55e; }
.err { color:#ef4444; }
.warn { color:#f59e0b; }
</style>
</head>

<body>

<h2>🔥 Worker → Render API 測試</h2>

<label>Worker URL</label>
<input id="api" value="https://dawn-bread-da14.yzy2018g.workers.dev/" />

<label>Image URL</label>
<input id="img" value="https://raw.githubusercontent.com/yzy2018g/my-ar-filter/deepfashion-style/style_1.png" />

<button onclick="test()">測試 API</button>

<div id="status" class="status">尚未測試</div>
<pre id="out"></pre>

<script>

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function fetchWithTimeout(url, options={}, timeout=30000){
  const c = new AbortController();
  const t = setTimeout(()=>c.abort(), timeout);

  try {
    const res = await fetch(url, {
      ...options,
      signal: c.signal,
      mode: "cors"
    });
    clearTimeout(t);
    return res;
  } catch (e) {
    clearTimeout(t);
    throw e;
  }
}

async function test(){

  const api = document.getElementById("api").value;
  const img = document.getElementById("img").value;

  const status = document.getElementById("status");
  const out = document.getElementById("out");

  out.textContent = "";
  status.textContent = "⏳ 開始測試...";
  status.className = "status warn";

  let lastErr = null;

  // 🔥 retry（解 Render 冷啟動）
  for(let i=1;i<=3;i++){

    try {
      status.textContent = `🚀 第 ${i} 次請求（可能喚醒 Render）`;

      const res = await fetchWithTimeout(api, {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
          url: img
        })
      }, 30000);

      if(!res.ok){
        throw new Error("HTTP " + res.status);
      }

      const data = await res.json();

      if(data.ok === false){
        throw new Error(data.error || "Worker error");
      }

      status.textContent = "✅ 成功";
      status.className = "status ok";

      out.textContent = JSON.stringify(data, null, 2);
      return;

    } catch(err){
      lastErr = err;

      status.textContent = `❌ retry ${i} failed: ${err.message}`;
      status.className = "status err";

      await sleep(1500);
    }
  }

  status.textContent = "❌ 最終失敗";
  out.textContent = String(lastErr);
}

</script>

</body>
</html>

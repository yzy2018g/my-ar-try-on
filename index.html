<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>API Test</title>
</head>
<body>

<h2>HF API 測試</h2>

<input
    id="url"
    style="width:600px"
    value="https://raw.githubusercontent.com/yzy2018g/my-ar-filter/deepfashion-style/style_1.png">

<button onclick="testAPI()">
    測試 API
</button>

<pre id="log"></pre>

<script type="module">
import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client@1.10.0/+esm";

const log = document.getElementById("log");

window.testAPI = async () => {

    try {

        log.textContent = "連線中...\n";

        const app = await client(
            "MichaelYo/my-ar-cloth-api"
        );

        log.textContent += "Space 已連線\n";
        log.textContent += "開始 predict...\n";

        const start = performance.now();

        const result = await app.predict(
            "/predict",
            [document.getElementById("url").value]
        );

        const sec =
            ((performance.now() - start) / 1000).toFixed(2);

        log.textContent +=
            "\n完成\n耗時: " +
            sec +
            " 秒\n\n";

        log.textContent +=
            JSON.stringify(result, null, 2);

        console.log(result);

    } catch(err) {

        console.error(err);

        log.textContent +=
            "\nERROR:\n" +
            err.message;
    }
};
</script>

</body>
</html>

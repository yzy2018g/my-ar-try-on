<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR 虛擬試衣間</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #222; color: white; margin: 0; padding: 20px; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .preview-box { display: flex; gap: 10px; margin-bottom: 10px; }
        .preview-box img { width: 80px; height: 80px; object-fit: cover; border: 2px solid #fff; cursor: pointer; border-radius: 8px; }
        .preview-box img.active { border-color: #00ffcc; }
        .view-panel { position: relative; width: 100%; max-width: 500px; aspect-ratio: 3/4; background: #000; border-radius: 12px; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        canvas { z-index: 10; pointer-events: none; } /* 讓 Canvas 疊在 Video 上 */
        .loading { display: none; color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

    <h1>AR 虛擬試衣間</h1>
    
    <div class="container">
        <div class="preview-box">
            <img src="cloth.png" alt="預覽1" onclick="selectCloth('cloth.png', this)">
            <img src="style_1.png" alt="預覽2" onclick="selectCloth('style_1.png', this)">
            <img src="style_2.png" alt="預覽3" onclick="selectCloth('style_2.png', this)">
        </div>

        <div id="loadingStatus" class="loading">後端 AI 去背處理中...請稍候...</div>

        <div class="view-panel">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="arCanvas"></canvas>
        </div>
    </div>
    <script type="module">
    // 直接從 CDN 引入官方最新的 Client 模組
    import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client@1/dist/index.min.js";

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('arCanvas');
    const ctx = canvas.getContext('2d');
    const loadingStatus = document.getElementById('loadingStatus');
    
    let currentClothingImage = new Image(); // 儲存去背後的衣服圖像
    let isClothLoaded = false;

    // 1. 初始化相機
    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
            video.srcObject = stream;
            video.addEventListener('loadedmetadata', () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                requestAnimationFrame(renderLoop);
            });
        } catch (err) {
            alert("無法開啟相機，請檢查權限設定。");
            console.error(err);
        }
    }

    // 2. 選擇衣服並送去 Hugging Face 去背 (將函式綁定到 window 讓 HTML 的 onclick 可以觸發)
    window.selectCloth = async function(imgSrc, element) {
        // 切換 UI 高亮
        document.querySelectorAll('.preview-box img').forEach(img => img.classList.remove('active'));
        element.classList.add('active');

        loadingStatus.style.display = "block";
        loadingStatus.textContent = "後端 AI 去背處理中...請稍候...";
        isClothLoaded = false;

        try {
            // 轉成本地 Blob
            const response = await fetch(imgSrc);
            const blob = await response.blob();

            // 1. 初始化 Gradio Client 連線 (直接填入你的 Space ID)
            const app = await Client.connect("michaelyo/my-ar-cloth-api");

            // 2. 呼叫後端 /predict 接口
            const result = await app.predict("/predict", { 
                input_image: blob 
            });

            console.log("Gradio 官方 SDK 回傳結果:", result);

            // 3. 取得去背後的圖片網址
            if (result.data && result.data[0]) {
                const dataObj = result.data[0];
                
                // 相容新舊版 Gradio 回傳格式
                if (dataObj && typeof dataObj === 'object' && dataObj.url) {
                    currentClothingImage.src = dataObj.url;
                } else if (typeof dataObj === 'string') {
                    currentClothingImage.src = dataObj;
                }

                currentClothingImage.onload = () => {
                    isClothLoaded = true;
                    loadingStatus.style.display = "none";
                };
            }
        } catch (error) {
            console.error("詳細錯誤訊息:", error);
            loadingStatus.textContent = "AI 處理失敗：" + error.message;
        }
    }

    // 3. AR 即時渲染迴圈
    function renderLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (isClothLoaded) {
            // 固定位置渲染（畫在畫面正中央，佔畫面的 60% 寬度）
            const clothWidth = canvas.width * 0.6;
            const clothHeight = clothWidth * (currentClothingImage.height / currentClothingImage.width);
            const clothX = (canvas.width - clothWidth) / 2;
            const clothY = (canvas.height - clothHeight) / 2 + 50; 

            ctx.drawImage(currentClothingImage, clothX, clothY, clothWidth, clothHeight);
        }

        requestAnimationFrame(renderLoop);
    }

    // 啟動相機
    setupCamera();
</script>

    
        
</body>
</html>

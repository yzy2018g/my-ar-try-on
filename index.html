<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Try-On (Phase 1)</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div id="app">

    <header class="header">
      AR Virtual Try-On (Phase 1)
    </header>

    <button id="startBtn" style="
      position:absolute;
      top:60px;
      left:50%;
      transform:translateX(-50%);
      z-index:999;
      padding:10px 20px;
    ">
      Start AR
    </button>

    <div class="camera-container">
      <video id="video" autoplay playsinline muted preload="auto"></video>
      <canvas id="canvas"></canvas>
    </div>

    <!-- ==============================
         CLOTHES PANEL（已更新去背素材）
    ============================== -->
    <div class="clothes-panel">

      <div class="cloth-item" data-cloth="assets/clothes/black-short.png">
        <img src="assets/clothes/black-short.png" />
        <span>Black Short</span>
      </div>

      <div class="cloth-item" data-cloth="assets/clothes/black1.png">
        <img src="assets/clothes/black1.png" />
        <span>Black Style</span>
      </div>

      <div class="cloth-item" data-cloth="assets/clothes/blue-suit.png">
        <img src="assets/clothes/blue-suit.png" />
        <span>Blue Suit</span>
      </div>

    </div>

    <div class="controls">
      <button id="btn-reset">Reset</button>
      <button id="btn-screenshot">Screenshot</button>
    </div>

  </div>

  <div id="debugPanel"></div>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>

  <script type="module" src="js/app.js"></script>

</body>
</html>

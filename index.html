<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Try-On (Phase 1)</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- App Container -->
  <div id="app">

    <!-- Header -->
    <header class="header">
      AR Virtual Try-On (Phase 1)
    </header>

    <!-- Camera Section -->
    <div class="camera-container">

      <!-- 原始影像 -->
      <video id="video" autoplay playsinline></video>

      <!-- AR疊圖 -->
      <canvas id="canvas"></canvas>

    </div>

    <!-- Clothes Selector -->
    <div class="clothes-panel">

      <div class="cloth-item" data-cloth="style_1.png">
        <img src="assets/clothes/style_1.png" />
        <span>Style 1</span>
      </div>

      <div class="cloth-item" data-cloth="style_2.png">
        <img src="assets/clothes/style_2.png" />
        <span>Style 2</span>
      </div>

    </div>

    <!-- Control Buttons -->
    <div class="controls">
      <button id="btn-reset">Reset</button>
      <button id="btn-screenshot">Screenshot</button>
    </div>

  </div>

  <!-- JS Modules -->
  <script src="js/camera.js"></script>
  <script src="js/pose.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<body>

<h3>API 測試11:20</h3>

<button onclick="test()">測 API</button>

<pre id="out">尚未測試</pre>

<script>
async function test() {
  const out = document.getElementById("out");
  out.innerText = "請求中...";

  try {
    const res = await fetch("https://my-ar-filter.onrender.com/predict", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        url: "https://raw.githubusercontent.com/yzy2018g/my-ar-filter/deepfashion-style/style_1.png"
      })
    });

    const text = await res.text();  // 👈 避免 json crash
    out.innerText = text;

  } catch (e) {
    out.innerText = "ERROR: " + e;
  }
}
</script>

</body>
</html>

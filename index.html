<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Try-On (Phase 1)</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div id="app">

    <header class="header">
      AR Virtual Try-On (Phase 1)
    </header>

    <!-- 🔥 加 start button（手機必須） -->
    <button id="startBtn" style="
      position:absolute;
      top:60px;
      left:50%;
      transform:translateX(-50%);
      z-index:999;
      padding:10px 20px;
    ">
      Start AR
    </button>

    <div class="camera-container">

      <video id="video" autoplay playsinline muted preload="auto"></video>
      <canvas id="canvas"></canvas>

    </div>

    <div class="clothes-panel">
      <div class="cloth-item" data-cloth="cloth.png">
        <img src="assets/clothes/cloth.png" />
        <span>Cloth</span>
      </div>

      <div class="cloth-item" data-cloth="style_1.png">
        <img src="assets/clothes/style_1.png" />
        <span>Style 1</span>
      </div>

      <div class="cloth-item" data-cloth="style_2.png">
        <img src="assets/clothes/style_2.png" />
        <span>Style 2</span>
      </div>

    </div>

    <div class="controls">
      <button id="btn-reset">Reset</button>
      <button id="btn-screenshot">Screenshot</button>
    </div>

  </div>

  <div id="debugPanel"></div>

  <!-- 🔥 MediaPipe 必加 -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>

  <!-- 🔥 改成 module -->
  <script type="module" src="js/app.js"></script>

</body>
</html>

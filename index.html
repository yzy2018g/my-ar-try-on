<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Debug Mode</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_bundle.js"></script>
</head>

<body>

<h1>AR 智慧動態試衣間（DEBUG）</h1>

<button id="startBtn">啟動</button>

<div id="debugBox" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: #000;
    color: #00ffcc;
    font-size: 12px;
    padding: 8px;
    z-index: 99999;
    white-space: pre-wrap;
    max-height: 40vh;
    overflow: auto;
">
🔵 DEBUG START\n
</div>

<div style="position:fixed;bottom:10px;left:10px;z-index:99999;color:white;font-size:12px">
    <div id="led-js">JS: ⬛</div>
    <div id="led-camera">CAMERA: ⬛</div>
    <div id="led-pose">POSE: ⬛</div>
    <div id="led-api">API: ⬛</div>
    <div id="led-render">RENDER: ⬛</div>
</div>

<div id="sysStatus">等待 JS 載入...</div>

<div class="preview-box">
    <img src="assets/cloth.png" onclick="selectCloth('cloth.png', this)">
    <img src="assets/style_1.png" onclick="selectCloth('style_1.png', this)">
    <img src="assets/style_2.png" onclick="selectCloth('style_2.png', this)">
</div>

<!-- 🔥 FIX：補上 view-panel（你之前缺這個） -->
<div class="view-panel">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="arCanvas"></canvas>
</div>

<script>
/* =========================
   超級 DEBUG 檢查器
========================= */

const box = document.getElementById("debugBox");

function log(msg) {
    console.log(msg);
    box.innerText += msg + "\n";
}

/* 1. 檢查 JS 是否有進來 */
log("🔵 HTML 已載入");

/* 2. 捕抓所有 JS error */
window.onerror = function (msg, src, line, col, err) {
    log("❌ JS錯誤: " + msg);
    log("📍位置: " + src + ":" + line);
};

/* 3. 檢查 app.js 是否成功 */
setTimeout(() => {
    if (!window.appLoaded) {
        log("❌ app.js 沒有成功執行（可能 404 或 import 壞掉）");
    } else {
        log("🟢 app.js 已成功載入");
    }
}, 3000);

</script>

<!-- 🔥 JS 主程式 -->
<script type="module" src="js/app.js"
    onerror="document.getElementById('debugBox').innerText += '\n❌ app.js 載入失敗（404 或路徑錯）'">
</script>

</body>
</html>

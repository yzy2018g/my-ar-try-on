<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepFashion AR Test UX Fix</title>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
    <script type="module">
        import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client@1.10.0/+esm";
        window.GradioClient = client;
    </script>
</head>

<body style="background:#0f172a;color:white;font-family:sans-serif">

<div id="app" style="padding:20px">

    <h2>HF API 測試（不卡 UI 版）</h2>

    <input v-model="url" style="width:90%;padding:8px" />

    <br><br>

    <button @click="testAPI" style="padding:10px 20px">
        測試 API
    </button>

    <p><b>狀態：</b>{{ status }}</p>
    <p><b>進度提示：</b>{{ message }}</p>

    <img v-if="img" :src="img" style="max-width:300px;margin-top:10px"/>

</div>

<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            url: "https://raw.githubusercontent.com/yzy2018g/my-ar-filter/deepfashion-style/style_1.png",
            status: "idle",
            message: "等待操作",
            client: null,
            img: ""
        }
    },

    async mounted() {
        this.status = "connecting";
        this.message = "連線 HF Space...";

        try {
            this.client = await window.GradioClient("MichaelYo/my-ar-cloth-api");
            this.status = "ready";
            this.message = "Space 已連線";
        } catch (e) {
            this.status = "error";
            this.message = "連線失敗";
        }
    },

    methods: {
        async testAPI() {

            if (!this.client) {
                this.message = "尚未連線";
                return;
            }

            this.status = "processing";

            // 🚀 不再卡住 UI
            this.message = "送出請求...";

            await new Promise(r => setTimeout(r, 200));

            this.message = "AI 排隊中...";

            let result;

            try {
                const start = performance.now();

                result = await this.client.predict("/predict", [
                    this.url
                ]);

                const time = ((performance.now() - start) / 1000).toFixed(2);

                this.message = `AI 完成（${time}s）`;

                if (result?.data?.[1]?.url) {
                    this.img = result.data[1].url;
                }

                this.status = "done";

            } catch (err) {
                console.error(err);
                this.status = "error";
                this.message = "API 失敗";
            }
        }
    }
}).mount("#app");
</script>

</body>
</html>

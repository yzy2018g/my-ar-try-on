<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>HF API 測試（不卡 UI 版）</title>
</head>

<body style="background:#0b0f1a;color:#fff;font-family:Arial;padding:20px">

<h2>HF API 測試</h2>

<input id="url" style="width:100%;padding:8px"
value="https://raw.githubusercontent.com/yzy2018g/my-ar-filter/deepfashion-style/style_1.png">

<br><br>

<button onclick="runTest()">測試 API</button>
<button onclick="reset()">重置</button>

<p id="status">狀態：尚未開始</p>
<p id="step">進度：-</p>

<pre id="log" style="background:#111;padding:10px;overflow:auto"></pre>

<img id="img" style="max-width:300px;margin-top:10px"/>

<script type="module">
import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client@1.10.0/+esm";

let app = null;
let controller = null;

window.runTest = async function () {
    const url = document.getElementById("url").value;

    document.getElementById("status").innerText = "狀態：連線中...";
    document.getElementById("step").innerText = "進度：初始化";

    try {
        // 建立 client
        if (!app) {
            app = await client("MichaelYo/my-ar-cloth-api");
        }

        document.getElementById("status").innerText = "狀態：Space 已連線";

        // 每次點擊都切斷上一個 request
        if (controller) controller.abort();
        controller = new AbortController();

        document.getElementById("step").innerText = "開始 predict...";

        const timeout = new Promise((_, reject) => {
            setTimeout(() => {
                controller.abort();
                reject(new Error("TIMEOUT 10s"));
            }, 10000);
        });

        const req = app.predict("/predict", [url]);

        const result = await Promise.race([req, timeout]);

        document.getElementById("log").innerText =
            JSON.stringify(result, null, 2);

        document.getElementById("status").innerText = "成功";

        if (result?.data?.[1]?.url) {
            document.getElementById("img").src = result.data[1].url;
        }

    } catch (e) {
        document.getElementById("status").innerText = "error";
        document.getElementById("step").innerText = "失敗：" + e.message;
        document.getElementById("log").innerText = String(e);
    }
};

window.reset = function () {
    document.getElementById("status").innerText = "狀態：reset";
    document.getElementById("step").innerText = "-";
    document.getElementById("log").innerText = "";
    document.getElementById("img").src = "";
};
</script>

</body>
</html>

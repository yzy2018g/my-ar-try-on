<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>API 測試工具 v1</title>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:#e2e8f0;
    padding:20px;
}
input, button {
    padding:10px;
    margin:5px 0;
    width:100%;
    border-radius:8px;
    border:1px solid #334155;
    background:#111827;
    color:white;
}
button {
    cursor:pointer;
    background:#6366f1;
}
pre {
    background:#111827;
    padding:10px;
    border-radius:8px;
    overflow:auto;
}
.status {
    margin-top:10px;
    font-weight:bold;
}
.ok { color:#22c55e; }
.err { color:#ef4444; }
.warn { color:#f59e0b; }
</style>
</head>

<body>

<h2>🔥 HF / Render API 測試工具</h2>

<label>API URL</label>
<input id="api" value="https://my-ar-filter.onrender.com/predict"/>

<label>Image URL</label>
<input id="img" value="https://raw.githubusercontent.com/yzy2018g/my-ar-filter/deepfashion-style/style_1.png"/>

<button onclick="testAPI()">測試 API</button>

<div class="status" id="status">尚未測試</div>
<pre id="log"></pre>

<script>

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function fetchWithTimeout(url, options={}, timeout=15000){
    const controller = new AbortController();
    const timer = setTimeout(()=>controller.abort(), timeout);

    try {
        const res = await fetch(url, {
            ...options,
            signal: controller.signal,
            mode: "cors",
        });
        clearTimeout(timer);
        return res;
    } catch (e) {
        clearTimeout(timer);
        throw e;
    }
}

async function testAPI(){

    const api = document.getElementById("api").value;
    const img = document.getElementById("img").value;

    const status = document.getElementById("status");
    const log = document.getElementById("log");

    log.textContent = "";
    status.textContent = "⏳ 準備測試...";
    status.className = "status warn";

    let lastErr = null;

    for(let i=1;i<=3;i++){
        try {
            status.textContent = `🚀 第 ${i} 次請求中...（可能喚醒 Render）`;

            const res = await fetchWithTimeout(api, {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({ input_data: img })
            }, 20000);

            if(!res.ok){
                throw new Error("HTTP " + res.status);
            }

            const data = await res.json();

            status.textContent = "✅ 成功";
            status.className = "status ok";

            log.textContent = JSON.stringify(data, null, 2);
            return;

        } catch(err){
            lastErr = err;
            status.textContent = `❌ retry ${i} failed... ${err.message}`;
            status.className = "status err";

            await sleep(1500);
        }
    }

    log.textContent = "最終失敗：" + lastErr;
}

</script>

</body>
</html>

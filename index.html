<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AR Try On</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

#preview {
    position: relative;
    width: 360px;
    margin: auto;
}

video, canvas {
    width: 360px;
    border-radius: 12px;
}

#clothOverlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 360px;
    pointer-events: none;
}

button {
    margin: 10px;
    padding: 10px;
}

.thumb {
    width: 80px;
    cursor: pointer;
    margin: 5px;
    border: 2px solid transparent;
}

.thumb.selected {
    border: 2px solid red;
}
</style>
</head>

<body>

<h2>AR 試衣系統</h2>

<div>
    <img src="style_1.png" class="thumb" onclick="selectCloth('style_1.png', this)">
    <img src="style_2.png" class="thumb" onclick="selectCloth('style_2.png', this)">
</div>

<div id="preview">
    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>
    <img id="clothOverlay">
</div>

<br>

<button onclick="capture()">試穿</button>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const clothOverlay = document.getElementById("clothOverlay");

let selectedCloth = "style_1.png";

// 🎥 開鏡頭
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
});

// 👕 選衣服
function selectCloth(img, el) {
    selectedCloth = img;

    document.querySelectorAll(".thumb").forEach(t => t.classList.remove("selected"));
    el.classList.add("selected");

    clothOverlay.src = img;
}

// 📸 拍照 + 傳 API
async function capture() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    canvas.toBlob(async (blob) => {
        let formData = new FormData();
        formData.append("person", blob);
        formData.append("cloth", selectedCloth);

        const res = await fetch("https://michaelyo-my-ar-cloth-api.hf.space/tryon", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        // 假設回傳 base64
        clothOverlay.src = data.result;
    });
}
</script>

</body>
</html>

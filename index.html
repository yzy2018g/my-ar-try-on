<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Try-On</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

<div id="app">

  <header class="header">
    AR Virtual Try-On
  </header>

  <!-- START BUTTON -->
  <button id="startBtn" class="start-btn">
    Start AR
  </button>

  <div class="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <!-- CLOTH SELECTOR -->
  <div class="clothes-panel">

    <div class="cloth-item" data-cloth="assets/clothes/cloth.png">
      <img src="assets/clothes/cloth.png" />
      <span>Basic</span>
    </div>

    <div class="cloth-item" data-cloth="assets/clothes/style_1.png">
      <img src="assets/clothes/style_1.png" />
      <span>Style 1</span>
    </div>

    <div class="cloth-item" data-cloth="assets/clothes/style_2.png">
      <img src="assets/clothes/style_2.png" />
      <span>Style 2</span>
    </div>

  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button id="btn-reset">Reset</button>
    <button id="btn-screenshot">Screenshot</button>
  </div>

</div>

<!-- DEBUG -->
<div id="debugPanel"></div>

<!-- MediaPipe Pose -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>

<!-- MAIN APP -->
<script type="module" src="js/app.js"></script>

</body>
</html>

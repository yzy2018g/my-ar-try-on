<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Debug Mode</title>

<link rel="stylesheet" href="style.css">

<!-- Mediapipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_bundle.js"></script>

<style>
/* 📱 debug 增強（手機必備） */
#debugBox {
    font-family: monospace;
    font-size: 12px;
    line-height: 1.3;
}

.view-panel {
    position: relative;
    width: 100%;
    height: 60vh;
    background: #111;
}

video, canvas {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>

</head>

<body>

<h1>AR 智慧動態試衣間（DEBUG）</h1>

<button id="startBtn">啟動</button>

<!-- =========================
     📱 DEBUG BOX（升級版）
========================= -->
<div id="debugBox" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: #000;
    color: #00ffcc;
    font-size: 12px;
    padding: 8px;
    z-index: 99999;
    white-space: pre-wrap;
    max-height: 40vh;
    overflow: auto;
">
🔵 DEBUG START
</div>

<!-- =========================
     LED PANEL
========================= -->
<div style="position:fixed;bottom:10px;left:10px;z-index:99999;color:white;font-size:12px">
    <div id="led-js">JS: ⬛</div>
    <div id="led-camera">CAMERA: ⬛</div>
    <div id="led-pose">POSE: ⬛</div>
    <div id="led-api">API: ⬛</div>
    <div id="led-render">RENDER: ⬛</div>
</div>

<!-- =========================
     STATUS
========================= -->
<div id="sysStatus">等待 JS 載入...</div>

<!-- =========================
     CLOTH SELECT
========================= -->
<div class="preview-box">
    <img src="assets/cloth.png" onclick="selectCloth('assets/cloth.png', this)">
    <img src="assets/style_1.png" onclick="selectCloth('assets/style_1.png', this)">
    <img src="assets/style_2.png" onclick="selectCloth('assets/style_2.png', this)">
</div>

<!-- =========================
     VIEW
========================= -->
<div class="view-panel">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="arCanvas"></canvas>
</div>

<!-- =========================
     📱 SUPER DEBUG SCRIPT
========================= -->
<script>
const box = document.getElementById("debugBox");

/* safe log */
function log(msg) {
    console.log(msg);
    if (box) {
        box.innerText += "\n" + msg;
        box.scrollTop = box.scrollHeight;
    }
}

/* 1️⃣ HTML loaded */
log("🔵 HTML 已載入");

/* 2️⃣ 捕抓 JS runtime error */
window.onerror = function (msg, src, line, col, err) {
    log("❌ JS錯誤: " + msg);
    log("📍 " + src + ":" + line);
};

/* 3️⃣ promise error（手機很重要） */
window.addEventListener("unhandledrejection", e => {
    log("❌ Promise錯誤: " + e.reason);
});

/* 4️⃣ app.js check */
setTimeout(() => {
    if (!window.appLoaded) {
        log("❌ app.js 沒載入 or import failed");
    } else {
        log("🟢 app.js 已成功載入");
    }
}, 3000);

/* 5️⃣ fetch debug hook（超重要） */
const _fetch = window.fetch;
window.fetch = async (...args) => {
    log("🌐 FETCH: " + args[0]);
    try {
        const res = await _fetch(...args);
        log("✅ FETCH OK: " + args[0]);
        return res;
    } catch (e) {
        log("❌ FETCH FAIL: " + e.message);
        throw e;
    }
};

/* 6️⃣ 防止手機 silent crash */
setInterval(() => {
    log("💓 heartbeat OK");
}, 8000);

</script>

<!-- =========================
     MAIN JS
========================= -->
<script type="module" src="js/app.js"
onerror="document.getElementById('debugBox').innerText += '\n❌ app.js 載入失敗（路徑/404/module錯誤）'">
</script>

</body>
</html>

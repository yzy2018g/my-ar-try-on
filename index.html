<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>API Debug Test</title>
</head>
<body style="font-family: sans-serif; background:#111; color:#fff; padding:20px">

<h2>HF / Render API 測試</h2>

<input id="apiUrl" style="width:90%" value="https://my-ar-filter.onrender.com/predict">
<br><br>

<input id="imgUrl" style="width:90%" value="https://raw.githubusercontent.com/yzy2018g/my-ar-filter/deepfashion-style/style_1.png">

<br><br>

<button onclick="testAPI()">測試 API</button>

<pre id="log" style="margin-top:20px; background:#222; padding:10px"></pre>

<script>
async function testAPI() {
    const apiUrl = document.getElementById("apiUrl").value;
    const imgUrl = document.getElementById("imgUrl").value;
    const log = document.getElementById("log");

    log.innerText = "開始測試...\n";

    try {
        const t0 = performance.now();

        const res = await fetch(apiUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(imgUrl)
        });

        const text = await res.text();
        const t1 = performance.now();

        log.innerText =
            "Status: " + res.status + "\n\n" +
            "Response:\n" + text + "\n\n" +
            "耗時: " + (t1 - t0).toFixed(0) + " ms";

    } catch (err) {
        log.innerText = "❌ Fetch 失敗\n\n" + err;
    }
}
</script>

</body>
</html>

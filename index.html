<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR 智慧動態試衣間</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_bundle.js"></script>
</head>
<body>

    <h1>AR 智慧動態試衣間</h1>

    <button class="start-btn" id="startBtn">
        點擊啟動相機與 AI 系統
    </button>

    <div class="status-bar" id="sysStatus">
        請先點擊上方按鈕啟動系統...
    </div>

    <div class="container">

        <div class="preview-box">
            <img src="cloth.png" alt="衣服1" onclick="selectCloth('cloth.png', this)">
            <img src="style_1.png" alt="衣服2" onclick="selectCloth('style_1.png', this)">
            <img src="style_2.png" alt="衣服3" onclick="selectCloth('style_2.png', this)">
        </div>

        <div id="loadingStatus" class="loading">
            後端 AI 去背處理中...請稍候...
        </div>

        <div class="view-panel">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="arCanvas"></canvas>
        </div>

    </div>

    <script type="module" src="js/app.js"></script>

</body>
</html>

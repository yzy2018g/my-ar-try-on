<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI 智能試衣鏡 - 開發版</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</head>
<body class="bg-black text-white m-0 p-0 overflow-hidden">

  <div id="app" class="relative w-screen h-screen">
    <video id="input_video" class="hidden" autoplay playsinline></video>
    <canvas id="output_canvas" class="w-full h-full object-cover"></canvas>

    <div class="absolute bottom-6 left-0 right-0 px-4 z-10">
      <div class="flex space-x-4 overflow-x-auto pb-2 justify-center">
        <div 
          v-for="(cloth, index) in clothesList" 
          :key="index"
          @click="selectCloth(cloth)"
          :class="['p-2 rounded-lg border-2 bg-gray-900/80 cursor-pointer transition w-20', 
                   currentCloth.id === cloth.id ? 'border-amber-500 scale-105' : 'border-transparent']"
        >
          <img :src="cloth.src" class="w-16 h-16 object-contain rounded mx-auto">
          <p class="text-[10px] text-center mt-1 truncate font-semibold">{{ cloth.name }}</p>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        // 衣服清單（請確保你 GitHub 裡有對應的圖片檔，沒有的話可以先用同一張圖測試）
        const clothesList = ref([
          { id: 1, name: '原創服飾', src: 'cloth.png', scale: 1.8, offset: 0.25 },
          { id: 2, name: '測試衣服 2', src: 'cloth.png', scale: 2.0, offset: 0.2 },
          { id: 3, name: '測試衣服 3', src: 'cloth.png', scale: 1.5, offset: 0.3 }
        ]);

        const currentCloth = ref(clothesList.value[0]);
        const clothImage = new Image();
        clothImage.src = currentCloth.value.src;
        let isImgLoaded = false;
        clothImage.onload = () => { isImgLoaded = true; };

        // 切換衣服
        const selectCloth = (cloth) => {
          currentCloth.value = cloth;
          isImgLoaded = false;
          clothImage.src = cloth.src; // 切換圖片路徑
        };

        // 原本的 MediaPipe 偵測邏輯
        onMounted(() => {
          const videoElement = document.getElementById('input_video');
          const canvasElement = document.getElementById('output_canvas');
          const canvasCtx = canvasElement.getContext('2d');

          function onResults(results) {
            if (!results.poseLandmarks) return;
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (isImgLoaded) {
              const lm = results.poseLandmarks;
              const leftShoulder = lm[11];
              const rightShoulder = lm[12];

              const shoulderWidth = Math.sqrt(
                Math.pow((leftShoulder.x - rightShoulder.x) * canvasElement.width, 2) +
                Math.pow((leftShoulder.y - rightShoulder.y) * canvasElement.height, 2)
              );

              // 動態讀取當前衣服的微調參數 (scale 與 offset)
              const scaleFactor = currentCloth.value.scale;
              const offsetFactor = currentCloth.value.offset;

              const centerX = ((leftShoulder.x + rightShoulder.x) / 2) * canvasElement.width;
              const centerY = ((leftShoulder.y + rightShoulder.y) / 2 + offsetFactor) * canvasElement.height;

              const clothWidth = shoulderWidth * scaleFactor;
              const clothHeight = clothWidth * (clothImage.height / clothImage.width);

              canvasCtx.translate(centerX, centerY);
              const angle = Math.atan2(
                (leftShoulder.y - rightShoulder.y) * canvasElement.height,
                (leftShoulder.x - rightShoulder.x) * canvasElement.width
              );
              canvasCtx.rotate(angle);

              canvasCtx.drawImage(clothImage, -clothWidth / 2, -clothHeight * 0.1, clothWidth, clothHeight);
            }
            canvasCtx.restore();
          }

          const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
          });
          pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
          pose.onResults(onResults);

          const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 1280, height: 720
          });
          camera.start();
        });

        return { clothesList, currentCloth, selectCloth };
      }
    }).mount('#app');
  </script>
</body>
</html>

      onFrame: async () => {
        await pose.send({image: videoElement});
      },
      width: 1280,
      height: 720
    });
    camera.start();

  </script>
</body>
</html>

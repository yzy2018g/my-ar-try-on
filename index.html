<!DOCTYPE html>
<html>
<body>
<h2>HF / Render API 測試11:12</h2>

<input id="url" style="width:500px"
value="https://raw.githubusercontent.com/yzy2018g/my-ar-filter/deepfashion-style/style_1.png">

<br><br>

<button onclick="test()">測試 API</button>

<pre id="out">尚未測試</pre>

<script>
async function test() {
    const url = document.getElementById("url").value;

    document.getElementById("out").innerText = "呼叫中...";

    try {
        const res = await fetch("https://my-ar-filter.onrender.com/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ url })
        });

        const data = await res.json();
        document.getElementById("out").innerText =
            JSON.stringify(data, null, 2);

    } catch (e) {
        document.getElementById("out").innerText = "ERROR: " + e;
    }
}
</script>

</body>
</html>

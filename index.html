<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR 虛擬試衣間</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background: #222; 
            color: white; 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
        }
        .preview-box { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 10px; 
        }
        .preview-box img { 
            width: 80px; 
            height: 80px; 
            object-fit: cover; 
            border: 2px solid #fff; 
            cursor: pointer; 
            border-radius: 8px; 
            transition: border 0.2s ease;
        }
        .preview-box img.active { 
            border-color: #00ffcc; 
        }
        .view-panel { 
            position: relative; 
            width: 100%; 
            max-width: 640px; 
            aspect-ratio: 4/3; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
        }
        video, canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        /* 將相機鏡頭水平翻轉，符合一般照鏡子習慣 */
        #webcam {
            transform: scaleX(-1);
        }
        /* Canvas 用來畫衣服，必須疊在 Video 上，且不阻擋滑鼠點擊 */
        canvas { 
            z-index: 10; 
            pointer-events: none; 
            transform: scaleX(-1); /* Canvas 也要一起翻轉鏡像 */
        } 
        .loading { 
            display: none; 
            color: #00ffcc; 
            font-weight: bold; 
            font-size: 1.1em;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

</head>
<body>

    <h1>AR 虛擬試衣間</h1>
    
    <div class="container">
        <div class="preview-box">
            <img src="cloth.png" alt="預覽1" onclick="selectCloth('cloth.png', this)">
            <img src="style_1.png" alt="預覽2" onclick="selectCloth('style_1.png', this)">
            <img src="style_2.png" alt="預覽3" onclick="selectCloth('style_2.png', this)">
        </div>

        <div id="loadingStatus" class="loading">後端 AI 去背處理中...請稍候...</div>
        <div id="debugStatus" style="color: #ffcc00; font-weight: bold; margin-top: 5px;">等待 MediaPipe 啟動...</div>


        <div class="view-panel">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="arCanvas"></canvas>
        </div>
    </div>

    <script type="module">
    import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client@1/dist/index.min.js";
    import { Pose } from "https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js";

    // 注意：這裡我們不再 import Camera 工具，改用原生 WebRTC

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('arCanvas');
    const ctx = canvas.getContext('2d');
    const loadingStatus = document.getElementById('loadingStatus');
    
    let currentClothingImage = new Image(); 
    let isClothLoaded = false;
    let currentLandmarks = null; 
    let isCameraPlaying = false;

    // ==========================================
    // 1. 初始化 MediaPipe Pose 身體追蹤
    // ==========================================
    // 修正後：強制指定 0.5.1675194473 穩定版，並使用完整的 jsDelivr 絕對路徑
    const pose = new Pose({
        locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675194473/${file}`;
        }
     });


    pose.setOptions({
        modelComplexity: 1,      
        smoothLandmarks: true,   
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    // 監聽 AI 骨架偵測結果
    pose.onResults((results) => {
        // 每當 MediaPipe 算完一影格，就清除畫布並重新渲染 AR 衣服
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (results.poseLandmarks) {
            currentLandmarks = results.poseLandmarks;
            if (isClothLoaded) {
                renderARClothing();
            }
        } else {
            currentLandmarks = null;
        }
    });

    // ==========================================
    // 2. 改用「純原生」相機啟動與影像循環送遞
    // ==========================================
    async function setupCamera() {
        try {
            // 啟動相機（只啟動這一次）
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: 640, height: 480 }, 
                audio: false 
            });
            video.srcObject = stream;
            
            video.addEventListener('loadedmetadata', () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                isCameraPlaying = true;
                
                // 啟動原生追蹤迴圈
                trackFrame();
            });
        } catch (err) {
            alert("相機啟動失敗，請重新整理網頁並檢查權限。");
            console.error("相機詳細錯誤:", err);
        }
    }

    // 利用瀏覽器的重繪機制，源源不絕地把畫面送給 MediaPipe
    async function trackFrame() {
        if (isCameraPlaying && video.readyState === video.HAVE_ENOUGH_DATA) {
            // 原生送影格給 MediaPipe 運算，避開官方 Camera 的硬體鎖衝突
            await pose.send({ image: video });
        }
        // 繼續追蹤下一幀
        requestAnimationFrame(trackFrame);
    }

    // ==========================================
    // 3. 選擇衣服並送去 Hugging Face 去背
    // ==========================================
    window.selectCloth = async function(imgSrc, element) {
        document.querySelectorAll('.preview-box img').forEach(img => img.classList.remove('active'));
        element.classList.add('active');

        loadingStatus.style.display = "block";
        loadingStatus.textContent = "後端 AI 去背處理中...請稍候...";
        isClothLoaded = false;

        try {
            const response = await fetch(imgSrc);
            const blob = await response.blob();

            const app = await Client.connect("https://michaelyo-my-ar-cloth-api.hf.space");
            const result = await app.predict("/predict", { input_image: blob });

            if (result.data && result.data[0]) {
                const dataObj = result.data[0];
                if (dataObj && typeof dataObj === 'object' && dataObj.url) {
                    currentClothingImage.src = dataObj.url;
                } else if (typeof dataObj === 'string') {
                    currentClothingImage.src = dataObj;
                }

                currentClothingImage.onload = () => {
                    isClothLoaded = true;
                    loadingStatus.style.display = "none";
                };
            }
        } catch (error) {
            console.error("詳細錯誤訊息:", error);
            loadingStatus.textContent = "AI 處理失敗：" + error.message;
        }
    }

    // ==========================================
    // 4. 動態運算與旋轉縮放（貼身渲染）
    // ==========================================
    function renderARClothing() {
        if (!currentLandmarks) return;

        const leftShoulder = currentLandmarks[11];
        const rightShoulder = currentLandmarks[12];

        if (leftShoulder.visibility < 0.5 || rightShoulder.visibility < 0.5) {
            return;
        }

        const xL = leftShoulder.x * canvas.width;
        const yL = leftShoulder.y * canvas.height;
        const xR = rightShoulder.x * canvas.width;
        const yR = rightShoulder.y * canvas.height;

        const midX = (xL + xR) / 2;
        const midY = (yL + yR) / 2;

        const dx = xL - xR;
        const dy = yL - yR;
        const shoulderDistance = Math.sqrt(dx * dx + dy * dy);

        const clothWidth = shoulderDistance * 2.0; 
        const clothHeight = clothWidth * (currentClothingImage.height / currentClothingImage.width);

        const angle = Math.atan2(dy, dx);

        ctx.save();
        ctx.translate(midX, midY); 
        ctx.rotate(angle);         
        
        const offsetY = - (clothHeight * 0.15); 
        
        ctx.drawImage(
            currentClothingImage, 
            -(clothWidth / 2),  
            offsetY,            
            clothWidth, 
            clothHeight
        );
        
        ctx.restore(); 
    }

    // 啟動相機
    setupCamera();
</script>

</body>
</html>

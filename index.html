<button onclick="test()">測 API11:27</button>
<pre id="out"></pre>

<script>
async function test() {
  const out = document.getElementById("out");
  out.innerText = "loading...";

  let retry = 0;

  while (retry < 3) {
    try {
      const res = await fetch("https://my-ar-filter.onrender.com/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          url: "https://raw.githubusercontent.com/yzy2018g/my-ar-filter/deepfashion-style/style_1.png"
        })
      });

      const data = await res.json();

      if (data.status === "warming") {
        out.innerText = "warming model... retrying";
        await new Promise(r => setTimeout(r, 2000));
        retry++;
        continue;
      }

      out.innerText = JSON.stringify(data, null, 2);
      return;

    } catch (e) {
      retry++;
      out.innerText = "retry " + retry + " failed...";
      await new Promise(r => setTimeout(r, 1500));
    }
  }

  out.innerText = "FAILED after retries";
}
</script>
